<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReturnGuard - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F62FE; --primary-dark: #0043CE; --secondary: #00D4AA;
            --dark: #0A0F1C; --gray-900: #161B2E; --gray-800: #1F2937;
            --gray-400: #9CA3AF; --gray-300: #D1D5DB; --white: #FFFFFF;
            --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--white); line-height: 1.6; }
        nav { background: var(--gray-900); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 1rem 0; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-actions { display: flex; gap: 1rem; align-items: center; }
        .user-info { color: var(--gray-300); font-size: 0.9rem; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-secondary { background: transparent; color: var(--gray-300); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); color: var(--white); }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .page-header { margin-bottom: 2rem; }
        h1 { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-400); font-size: 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--gray-900); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1.5rem; transition: all 0.3s ease; }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-label { color: var(--gray-400); font-size: 0.85rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 800; color: var(--white); }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.5rem 1rem; background: var(--gray-800); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--gray-300); cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); }
        .returns-grid { display: grid; gap: 1rem; }
        .return-card { background: var(--gray-900); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1.5rem; transition: all 0.3s ease; }
        .return-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .return-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
        .return-info h3 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .retailer { color: var(--gray-400); font-size: 0.9rem; }
        .status-badge { padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-badge.pending { background: rgba(251, 191, 36, 0.1); color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.3); }
        .status-badge.in_transit { background: rgba(59, 130, 246, 0.1); color: #3B82F6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-badge.received { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-badge.refund_issued { background: rgba(0, 212, 170, 0.1); color: var(--secondary); border: 1px solid rgba(0, 212, 170, 0.3); }
        .status-badge.delayed { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .return-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .detail-item { display: flex; flex-direction: column; }
        .detail-label { color: var(--gray-400); font-size: 0.8rem; margin-bottom: 0.25rem; }
        .detail-value { color: var(--white); font-weight: 600; }
        .amount { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--success); }
        .return-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .action-btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; color: var(--gray-300); cursor: pointer; font-size: 0.85rem; transition: all 0.3s ease; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--white); }
        .empty-state { text-align: center; padding: 4rem 2rem; background: var(--gray-900); border-radius: 12px; border: 1px dashed rgba(255, 255, 255, 0.2); }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state h3 { font-family: 'Sora', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-400); margin-bottom: 1.5rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--gray-900); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 2rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h2 { font-family: 'Sora', sans-serif; font-size: 1.5rem; }
        .close-btn { background: transparent; border: none; color: var(--gray-400); font-size: 1.5rem; cursor: pointer; }
        .close-btn:hover { color: var(--white); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: var(--gray-300); margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; background: var(--gray-800); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--white); font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .loading { display: flex; justify-content: center; align-items: center; padding: 3rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .alert.info { background: rgba(15, 98, 254, 0.1); border: 1px solid rgba(15, 98, 254, 0.3); color: var(--primary); }
        .alert.warning { background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); color: var(--warning); }
        .alert.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .return-header { flex-direction: column; gap: 1rem; }
            .return-details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">ReturnGuard</div>
            <div class="nav-actions">
                <span class="user-info" id="userInfo">Loading...</span>
                <button class="btn btn-primary" onclick="scanEmails()">Scan Emails</button>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="page-header">
            <h1>Returns Dashboard</h1>
            <p class="subtitle">Track all your returns and refunds in one place</p>
        </div>
        <div id="alertContainer"></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total Returns</div><div class="stat-value" id="totalReturns">-</div></div>
            <div class="stat-card"><div class="stat-label">Active Returns</div><div class="stat-value warning" id="activeReturns">-</div></div>
            <div class="stat-card"><div class="stat-label">Total Recovered</div><div class="stat-value success" id="totalRecovered">-</div></div>
            <div class="stat-card"><div class="stat-label">Pending Refunds</div><div class="stat-value" id="pendingRefunds">-</div></div>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Returns</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="in_transit">In Transit</button>
            <button class="filter-btn" data-filter="received">Received</button>
            <button class="filter-btn" data-filter="refund_issued">Refunded</button>
            <button class="filter-btn" data-filter="delayed">Delayed</button>
        </div>
        <div id="returnsContainer"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="modal" id="updateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Update Return</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="updateForm" onsubmit="updateReturn(event)">
                <div class="form-group">
                    <label>Status</label>
                    <select id="updateStatus" required>
                        <option value="pending">Pending</option>
                        <option value="in_transit">In Transit</option>
                        <option value="received">Received</option>
                        <option value="refund_issued">Refund Issued</option>
                        <option value="delayed">Delayed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tracking Number (optional)</label>
                    <input type="text" id="updateTracking" placeholder="Enter tracking number">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="updateRefunded"> Refund Received</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Update Return</button>
            </form>
        </div>
    </div>
    <script>
        let currentFilter = 'all', allReturns = [], currentReturnId = null;
        const API_URL = window.location.origin + '/api';
        
        function getToken() { return localStorage.getItem('token'); }
        function checkAuth() { const token = getToken(); if (!token) { window.location.href = '/'; return false; } return true; }
        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
        async function authFetch(url, options = {}) {
            return fetch(url, { ...options, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`, ...options.headers } });
        }
        
        async function loadProfile() {
            try {
                const response = await authFetch(`${API_URL}/profile`);
                const data = await response.json();
                if (response.ok) document.getElementById('userInfo').textContent = data.name;
            } catch (error) { console.error('Failed to load profile:', error); }
        }
        
        async function loadAnalytics() {
            try {
                const response = await authFetch(`${API_URL}/analytics`);
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('totalReturns').textContent = data.totalReturns;
                    document.getElementById('activeReturns').textContent = data.activeReturns;
                    document.getElementById('totalRecovered').textContent = `$${data.totalRefundsReceived.toFixed(2)}`;
                    document.getElementById('pendingRefunds').textContent = `$${data.pendingRefunds.toFixed(2)}`;
                }
            } catch (error) { console.error('Failed to load analytics:', error); }
        }
        
        async function loadReturns() {
            try {
                const response = await authFetch(`${API_URL}/returns`);
                const data = await response.json();
                if (response.ok) { allReturns = data; renderReturns(); }
            } catch (error) {
                document.getElementById('returnsContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load returns</h3><p>Please try refreshing the page</p></div>';
            }
        }
        
        function renderReturns() {
            const container = document.getElementById('returnsContainer');
            let filtered = currentFilter === 'all' ? allReturns : allReturns.filter(r => r.status === currentFilter);
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>No returns found</h3><p>Click "Scan Emails" to find your return confirmations</p><button class="btn btn-primary" onclick="scanEmails()">Scan Emails</button></div>';
                return;
            }
            container.innerHTML = '<div class="returns-grid">' + filtered.map(ret => `
                <div class="return-card">
                    <div class="return-header">
                        <div class="return-info"><h3>${ret.itemName}</h3><div class="retailer">${ret.retailer} • ${ret.orderNumber}</div></div>
                        <span class="status-badge ${ret.status}">${formatStatus(ret.status)}</span>
                    </div>
                    <div class="return-details">
                        <div class="detail-item"><span class="detail-label">Return Initiated</span><span class="detail-value">${formatDate(ret.returnInitiated)}</span></div>
                        <div class="detail-item"><span class="detail-label">Deadline</span><span class="detail-value">${formatDate(ret.returnDeadline)}</span></div>
                        <div class="detail-item"><span class="detail-label">Expected Refund</span><span class="amount">$${ret.expectedRefund.toFixed(2)}</span></div>
                        ${ret.trackingNumber ? `<div class="detail-item"><span class="detail-label">Tracking</span><span class="detail-value">${ret.trackingNumber}</span></div>` : ''}
                        ${ret.refundReceived ? `<div class="detail-item"><span class="detail-label">Refund Date</span><span class="detail-value" style="color: var(--success)">${formatDate(ret.refundDate)}</span></div>` : ''}
                        ${ret.daysOverdue ? `<div class="detail-item"><span class="detail-label">Days Overdue</span><span class="detail-value" style="color: var(--danger)">${ret.daysOverdue} days</span></div>` : ''}
                    </div>
                    <div class="return-actions">
                        <button class="action-btn" onclick="openUpdateModal('${ret.id}')">Update Status</button>
                        <button class="action-btn" onclick="deleteReturn('${ret.id}')">Delete</button>
                    </div>
                </div>
            `).join('') + '</div>';
        }
        
        function formatStatus(s) { return s.replace('_', ' ').toUpperCase(); }
        function formatDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
        
        async function scanEmails() {
            showAlert('Scanning your emails for return confirmations...', 'info');
            try {
                const response = await authFetch(`${API_URL}/scan-emails`, { method: 'POST' });
                const data = await response.json();
                if (response.ok) { showAlert(`Found ${data.newReturns} new returns!`, 'success'); loadReturns(); loadAnalytics(); }
                else showAlert('Failed to scan emails', 'warning');
            } catch (error) { showAlert('Failed to scan emails', 'warning'); }
        }
        
        function showAlert(msg, type) {
            document.getElementById('alertContainer').innerHTML = `<div class="alert ${type}"><span>${msg}</span></div>`;
            setTimeout(() => document.getElementById('alertContainer').innerHTML = '', 5000);
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderReturns();
            });
        });
        
        function openUpdateModal(id) {
            currentReturnId = id;
            const ret = allReturns.find(r => r.id === id);
            if (ret) {
                document.getElementById('updateStatus').value = ret.status;
                document.getElementById('updateTracking').value = ret.trackingNumber || '';
                document.getElementById('updateRefunded').checked = ret.refundReceived;
                document.getElementById('updateModal').classList.add('show');
            }
        }
        
        function closeModal() { document.getElementById('updateModal').classList.remove('show'); currentReturnId = null; }
        
        async function updateReturn(event) {
            event.preventDefault();
            try {
                const response = await authFetch(`${API_URL}/returns/${currentReturnId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({
                        status: document.getElementById('updateStatus').value,
                        trackingNumber: document.getElementById('updateTracking').value,
                        refundReceived: document.getElementById('updateRefunded').checked
                    })
                });
                if (response.ok) { showAlert('Return updated successfully', 'success'); closeModal(); loadReturns(); loadAnalytics(); }
                else showAlert('Failed to update return', 'warning');
            } catch (error) { showAlert('Failed to update return', 'warning'); }
        }
        
        async function deleteReturn(id) {
            if (!confirm('Are you sure you want to delete this return?')) return;
            try {
                const response = await authFetch(`${API_URL}/returns/${id}`, { method: 'DELETE' });
                if (response.ok) { showAlert('Return deleted', 'success'); loadReturns(); loadAnalytics(); }
                else showAlert('Failed to delete return', 'warning');
            } catch (error) { showAlert('Failed to delete return', 'warning'); }
        }
        
        if (checkAuth()) { loadProfile(); loadAnalytics(); loadReturns(); }
    </script>
</body>
</html>
